name: Bug Report
description: Report a bug to help us improve
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run 'karnel install ...'
        2. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste any relevant terminal output or logs.
      render: shell
  - type: input
    id: version
    attributes:
      label: Karnel version
      description: Run `karnel --version`
      placeholder: "4.9.5"
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device / Android version
      placeholder: "Android 12, OnePlus 9"
